{% extends 'base.html' %}

{% block title %}Informes{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4 text-center">Generar Informes</h2>
    
    <div class="row">
        {% for informe in informes %}
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm d-flex flex-column h-100">
                <div class="card-body d-flex flex-column text-center">
                    <h5 class="card-title">{{ informe.titulo }}</h5>
                    <p class="card-text text-muted flex-grow-1">{{ informe.descripcion }}</p>
                    <a href="{% url informe.url %}" class="btn btn-primary mt-auto">
                        <i class="bi bi-download"></i> Descargar
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
