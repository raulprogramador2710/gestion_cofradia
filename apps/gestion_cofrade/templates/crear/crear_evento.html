{% extends 'base.html' %}
{% block title %}Crear Evento{% endblock %}
{% block content %}
{% load widget_tweaks %}
<div class="container mt-5">
    <h1 class="mb-4">Crear Evento</h1>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label for="{{ form.nombre.id_for_label }}" class="form-label">Nombre</label>
            {{ form.nombre|add_class:"form-control" }}
        </div>
        <div class="mb-3">
            <label for="{{ form.fecha.id_for_label }}" class="form-label">Fecha</label>
            {{ form.fecha|add_class:"form-control" }}
        </div>
        <div class="mb-3">
            <label for="{{ form.tipo.id_for_label }}" class="form-label">Tipo</label>
            {{ form.tipo|add_class:"form-select" }}
        </div>
        <button type="submit" class="btn btn-primary">Crear Evento</button>
    </form>
</div>
{% endblock %}
