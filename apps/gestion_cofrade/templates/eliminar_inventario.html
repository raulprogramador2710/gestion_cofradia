{% extends 'base.html' %}

{% block title %}Eliminar Inventario{% endblock %}

{% block content %}
  <h1>Eliminar Inventario</h1>
  <p>¿Estás seguro de que deseas eliminar el material "{{ inventario.nombre }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Eliminar</button>
  </form>
  <a href="{% url 'lista_inventario' %}">Cancelar</a>
{% endblock %}
