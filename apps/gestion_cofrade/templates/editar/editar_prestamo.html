{% extends 'base.html' %}

{% block title %}Editar Préstamo{% endblock %}

{% block content %}
  <h1>Editar Préstamo</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="text-center mt-3">
      <button type="submit" class="btn btn-primary px-4">
          💾 Guardar Cambios
      </button>
      <a href="{% url 'lista_prestamos' %}" class="btn btn-secondary px-4">
          ⬅️ Volver
      </a>
  </div>
  </form>
{% endblock %}
