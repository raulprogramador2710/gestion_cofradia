{% extends 'base.html' %}

{% block title %}Editar Inventario{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="card shadow-lg p-4">
      <h2 class="text-center">Editar Inventario</h2>
      <form method="post">
          {% csrf_token %}
          <div class="row">
              {% for field in form %}
                  <div class="col-md-6 mb-3">
                      <label class="form-label fw-bold">{{ field.label }}</label>
                      {{ field }}  <!-- El campo de fecha se renderiza automáticamente con el formato 'dd/mm/yyyy' -->
                      <div class="text-danger small">{{ field.errors }}</div>
                  </div>
              {% endfor %}
          </div>

          <div class="text-center mt-3">
              <button type="submit" class="btn btn-primary px-4">
                  💾 Guardar Cambios
              </button>
              <a href="{% url 'lista_inventarios' %}" class="btn btn-secondary px-4">
                  ⬅️ Volver
              </a>
          </div>
      </form>
  </div>
</div>
{% endblock %}
