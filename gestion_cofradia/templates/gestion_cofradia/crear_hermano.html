{% extends "gestion_cofradia/base.html" %}
{% load static %}

{% block title %}Nuevo Hermano{% endblock %}

{% block content %}

        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar</button>
    </form>
    <a href="{% url 'listar_hermanos' %}">⬅️ Volver a la lista</a>
{% endblock %}
